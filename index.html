<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography — Shijie Zhou</title>
  <meta name="description" content="A photographic monograph — selected photographs by Shijie Zhou.">
  <script>
    // 默认深色；仅当用户手动选过浅色时切换（CSS 加载前执行，避免闪烁）
    (function () {
      if (localStorage.getItem("theme") === "light") {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#contents">Skip to contents</a>

  <header class="topbar" id="topbar">
    <a class="wordmark" href="#top">Selected Photographs</a>
    <div class="topbar-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="tt-icon" viewBox="0 0 24 24" aria-hidden="true">
          <mask id="ttMoonMask">
            <rect width="24" height="24" fill="white"/>
            <circle class="tt-mask-circle" cx="12" cy="12" r="6" fill="black"/>
          </mask>
          <circle class="tt-core" cx="12" cy="12" r="5.2" fill="currentColor" mask="url(#ttMoonMask)"/>
          <g class="tt-rays" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <line x1="12" y1="1.8" x2="12" y2="4.2"/>
            <line x1="12" y1="19.8" x2="12" y2="22.2"/>
            <line x1="1.8" y1="12" x2="4.2" y2="12"/>
            <line x1="19.8" y1="12" x2="22.2" y2="12"/>
            <line x1="4.6" y1="4.6" x2="6.3" y2="6.3"/>
            <line x1="17.7" y1="17.7" x2="19.4" y2="19.4"/>
            <line x1="17.7" y1="6.3" x2="19.4" y2="4.6"/>
            <line x1="4.6" y1="19.4" x2="6.3" y2="17.7"/>
          </g>
        </svg>
      </button>
      <button class="index-toggle" id="indexToggle" aria-expanded="false" aria-controls="indexOverlay">Index</button>
    </div>
  </header>

  <nav class="index-overlay" id="indexOverlay" aria-hidden="true">
    <ol class="index-list" id="indexList"></ol>
  </nav>

  <main id="top">
    <section class="hero">
      <p class="hero-kicker">Selected Photographs</p>
      <h1 class="hero-title" id="heroAuthor"></h1>
      <p class="hero-sub" id="heroSub"></p>
      <p class="hero-statement" id="heroStatement"></p>
      <p class="hero-stats" id="heroStats"></p>
    </section>

    <nav class="contents" id="contents" aria-label="Series index">
      <ol class="contents-list" id="contentsList"></ol>
      <p class="scroll-hint">Scroll to explore</p>
    </nav>

    <div id="seriesRoot"></div>
  </main>

  <footer class="site-footer">
    <p class="footer-name" id="footerName"></p>
    <nav class="footer-links" id="footerLinks"></nav>
    <p class="footer-copy" id="footerCopy"></p>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Photograph viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">×</button>
    <button class="lb-prev" id="lbPrev" aria-label="Previous">←</button>
    <button class="lb-next" id="lbNext" aria-label="Next">→</button>
    <figure class="lb-figure">
      <div class="lb-media" id="lbMedia"></div>
      <figcaption class="lb-caption" id="lbCaption"></figcaption>
    </figure>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
